<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>L-flex — Services</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root{
      --gold:#b8860b;
      --gold2:#d4af37;
      --bg:#fffdfa;
      --paper:#ffffff;
      --ink:#1b1b1b;
      --muted:#5a5a5a;
      --border:#eadfc7;
      --shadow: rgba(184, 134, 11, 0.12);
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:"Jost", system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      color:var(--ink);
      background:
        radial-gradient(900px 480px at 10% 10%, rgba(212,175,55,.14) 0%, transparent 60%),
        radial-gradient(900px 520px at 90% 90%, rgba(184,134,11,.10) 0%, transparent 60%),
        var(--bg);
    }

    .wrap{
      min-height:100%;
      display:grid;
      place-items:center;
      padding:32px 18px;
    }

    .card{
      width:min(920px, 100%);
      background:rgba(255,255,255,.82);
      border:1px solid var(--border);
      border-radius:22px;
      box-shadow:0 24px 70px rgba(0,0,0,.06);
      overflow:hidden;
      backdrop-filter: blur(8px);
    }

    .top{
      padding:34px 26px 18px;
      text-align:center;
      position:relative;
      background:
        linear-gradient(180deg, rgba(255,255,255,.92) 0%, rgba(245,240,225,.68) 100%);
      border-bottom:1px solid rgba(234,223,199,.9);
    }
    .top::after{
      content:"";
      position:absolute;
      left:50%;
      bottom:-1px;
      transform:translateX(-50%);
      width:140px;
      height:2px;
      background:linear-gradient(90deg, transparent, var(--gold), transparent);
    }

    .brand{
      font-family:"Cormorant Garamond", Georgia, serif;
      font-weight:600;
      letter-spacing:0.32em;
      text-transform:uppercase;
      color:var(--gold);
      font-size:2.2rem;
      margin:0;
      line-height:1.1;
    }
    .sub{
      margin:10px auto 0;
      max-width:62ch;
      color:var(--muted);
      font-weight:300;
      letter-spacing:.02em;
      font-size:.98rem;
    }
    .mark{
      width:54px;
      height:54px;
      margin:0 auto;
      border-radius:18px;
      border:1px solid rgba(234,223,199,.95);
      background:
        radial-gradient(circle at 30% 30%, rgba(212,175,55,.22), transparent 55%),
        linear-gradient(180deg, rgba(245,240,225,.85), rgba(255,255,255,.85));
      box-shadow: 0 18px 46px rgba(184, 134, 11, 0.10);
      position:relative;
    }
    .mark::after{
      content:"";
      position:absolute;
      inset:14px;
      border-radius:14px;
      border:1px dashed rgba(212,175,55,.28);
    }

    .actions{
      padding:26px;
      display:grid;
      grid-template-columns:repeat(2, minmax(0,1fr));
      gap:14px;
    }

    .btn{
      appearance:none;
      border:none;
      width:100%;
      text-decoration:none;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      padding:18px 18px 18px 18px;
      border-radius:18px;
      background:var(--paper);
      border:1px solid rgba(234,223,199,.95);
      transition: transform .22s ease, box-shadow .22s ease, border-color .22s ease;
      box-shadow: 0 8px 26px rgba(0,0,0,.05);
      position:relative;
      overflow:hidden;
    }
    .btn::before{
      content:"";
      position:absolute;
      inset:-1px;
      background:linear-gradient(135deg, rgba(212,175,55,.18), rgba(184,134,11,.06));
      opacity:.0;
      transition: opacity .22s ease;
      pointer-events:none;
    }
    .btn:hover{
      transform: translateY(-3px);
      border-color: rgba(212,175,55,.55);
      box-shadow: 0 18px 40px var(--shadow);
    }
    .btn:hover::before{opacity:1}
    .btn:active{transform: translateY(-1px)}
    .btn:focus-visible{
      outline: 3px solid rgba(212,175,55,.35);
      outline-offset: 3px;
    }

    .btn-left{
      display:flex;
      align-items:center;
      gap:12px;
      position:relative;
      z-index:1;
    }

    .icon{
      width:44px;
      height:44px;
      border-radius:14px;
      display:grid;
      place-items:center;
      border:1px solid rgba(234,223,199,.95);
      background:linear-gradient(180deg, rgba(245,240,225,.85), rgba(255,255,255,.85));
      color:var(--gold);
      flex:0 0 auto;
    }
    .icon svg{width:22px;height:22px}

    .btn-title{
      font-size:1.05rem;
      font-weight:500;
      letter-spacing:.06em;
      text-transform:uppercase;
      margin:0;
      color:var(--ink);
    }
    .btn-note{
      margin:4px 0 0;
      font-size:.92rem;
      color:var(--muted);
      font-weight:300;
    }

    .arrow{
      position:relative;
      z-index:1;
      width:42px;
      height:42px;
      border-radius:999px;
      display:grid;
      place-items:center;
      border:1px solid rgba(234,223,199,.95);
      background:rgba(255,255,255,.8);
      color:var(--gold);
      transition: transform .22s ease;
      flex:0 0 auto;
    }
    .btn:hover .arrow{ transform: translateX(2px); }

    @media (max-width: 720px){
      .actions{grid-template-columns:1fr}
      .mark{width:48px;height:48px;border-radius:16px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card" role="main" aria-label="L-flex services">
      <header class="top">
        <div class="mark" aria-hidden="true"></div>
      </header>

      <section class="actions" aria-label="Service options">
        <a
          class="btn"
          href="https://www.dropbox.com/scl/fi/a04mz1vqwqppfhewmo0l5/EXPRESS-WASH-1.pdf?rlkey=vzw77hf2eneh8hd2x4qw7w1ry&raw=1"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Laundry (opens PDF)"
        >
          <div class="btn-left">
            <div class="icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M6 3h12a2 2 0 0 1 2 2v16H4V5a2 2 0 0 1 2-2Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
                <path d="M7.5 7.2h2" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
                <path d="M10.8 7.2h2" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
                <path d="M12 18a5 5 0 1 0 0-10 5 5 0 0 0 0 10Z" stroke="currentColor" stroke-width="1.6"/>
                <path d="M9.8 14.1c.8 1.5 3.1 1.9 4.6.6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
              </svg>
            </div>
            <div>
              <p class="btn-title">Laundry</p>
              <p class="btn-note">Wash • iron • fold</p>
            </div>
          </div>
          <span class="arrow" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M9 6l6 6-6 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
        </a>

        <a
          class="btn"
          href="https://www.dropbox.com/scl/fi/lcbn1ne58p9lk0fkqcu8l/L-flex-Brand-Catalogue.pdf?rlkey=nudcprn5t26fzvdwtxnixjvwp&raw=1"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Tailoring (opens PDF)"
        >
          <div class="btn-left">
            <div class="icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M7 3c2 3 3.5 4 5 4s3-1 5-4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
                <path d="M12 7v14" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
                <path d="M12 10c-2.4 0-4.6-.9-6.2-2.4L4 10.5l4.5 4.5-2 6h11l-2-6L20 10.5l-1.8-2.9C16.6 9.1 14.4 10 12 10Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
              </svg>
            </div>
            <div>
              <p class="btn-title">Tailoring</p>
              <p class="btn-note">Custom • repairs • fitting</p>
            </div>
          </div>
          <span class="arrow" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M9 6l6 6-6 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
        </a>
      </section>

    </div>
  </div>
</body>
</html>
